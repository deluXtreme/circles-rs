name: Publish Crates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate and print the publish plan instead of pushing to crates.io"
        required: true
        default: true
        type: boolean
      start_at:
        description: "Crate to start from when resuming a release"
        required: true
        default: "circles-types"
        type: choice
        options:
          - circles-types
          - circles-utils
          - circles-rpc
          - circles-pathfinder
          - circles-transfers
          - circles-sdk

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo registry and target directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Validate workspace
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          chmod +x scripts/publish-crates.sh
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            scripts/publish-crates.sh --dry-run --start-at "${{ inputs.start_at }}"
          else
            scripts/publish-crates.sh --publish --start-at "${{ inputs.start_at }}"
          fi
